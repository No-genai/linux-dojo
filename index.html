<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linux コマンド道場です</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-bracket">[</span>
      <span class="logo-text">Linux道場</span>
      <span class="logo-bracket">]</span>
    </div>
    <input type="text" id="search" placeholder="🔍 コマンドを検索...">
    <button class="btn-quiz-start" onclick="startQuiz()">
      <span class="btn-icon">⚡</span> クイズに挑戦してね
    </button>
    <div class="progress-badge">
      <span class="pb-label">習得</span>
      <span class="pb-nums"><span id="learned-count">0</span><span class="pb-sep">/</span><span id="total-count">0</span></span>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar">
      <p class="sidebar-label">カテゴリ</p>
      <ul id="category-list">
        <li class="active" data-cat="all">📁 すべて</li>
        <li data-cat="file">📄 ファイル操作</li>
        <li data-cat="dir">🗂 ディレクトリ</li>
        <li data-cat="text">📝 テキスト処理</li>
        <li data-cat="system">💻 システム情報</li>
        <li data-cat="permission">🔐 パーミッション</li>
        <li data-cat="network">🌐 ネットワーク</li>
        <li data-cat="package">📦 パッケージ管理</li>
      </ul>
    </aside>

    <section class="commands-area">
      <div id="commands-grid" class="commands-grid"></div>
    </section>

    <aside class="detail-panel" id="detail-panel">
      <div class="detail-placeholder">
        <div class="placeholder-arrow">←</div>
        <p>コマンドをクリックすると<br>詳細が表示されます</p>
      </div>
    </aside>

  </div>

  <!-- ターミナル -->
  <div class="terminal-wrap" id="terminal-wrap">
    <div class="terminal-titlebar">
      <div class="term-dots">
        <span class="tdot red"></span>
        <span class="tdot yellow"></span>
        <span class="tdot green"></span>
      </div>
      <span class="terminal-label">ターミナル練習</span>
      <span class="term-hint-label">Tab補完 &nbsp;|&nbsp; ↑↓で履歴 &nbsp;|&nbsp; <code>help</code>で一覧</span>
      <button class="btn-fullterm" onclick="toggleFullTerm()" title="フルスクリーン">⛶</button>
    </div>
    <div class="terminal-output" id="terminal-output">
      <div class="t-line t-system">Linux コマンド道場へようこそ！ コマンドを入力して練習しよう。<br><span class="t-hint">ヒント: <code>help</code> で使えるコマンド一覧 / <code>Tab</code>キーで補完</span></div>
    </div>
    <div class="terminal-input-row">
      <span class="t-prompt" id="t-prompt">user@linux:~$&nbsp;</span>
      <input type="text" id="terminal-input" autocomplete="off" spellcheck="false" placeholder="コマンドを入力して Enter">
    </div>
  </div>

  <!-- クイズオーバーレイ -->
  <div id="quiz-overlay" class="quiz-overlay" onclick="closeQuizOverlay(event)">
    <div class="quiz-modal">
      <button class="quiz-close" onclick="closeQuiz()">✕</button>

      <!-- 問題画面 -->
      <div id="quiz-question-screen">
        <div class="quiz-header">
          <div class="quiz-meta">
            <span id="quiz-progress-text" class="qprogress-text">問題 1 / 10</span>
            <span class="quiz-score-label">スコア <strong id="quiz-score-num">0</strong></span>
          </div>
          <div class="quiz-progress-track">
            <div id="quiz-progress-bar" class="quiz-progress-fill"></div>
          </div>
        </div>
        <div class="quiz-type-badge" id="quiz-type-badge"></div>
        <div id="quiz-question" class="quiz-question-text"></div>
        <div id="quiz-choices" class="quiz-choices"></div>
        <div id="quiz-feedback" class="quiz-feedback"></div>
        <div class="quiz-explain" id="quiz-explain"></div>
        <button id="quiz-next" class="btn-quiz-next" onclick="nextQuestion()" style="display:none">次の問題 →</button>
      </div>

      <!-- 結果画面 -->
      <div id="quiz-result-screen" style="display:none">
        <div class="quiz-result-content">
          <div id="result-emoji" class="result-emoji"></div>
          <div id="result-label" class="result-label"></div>
          <div class="result-score-wrap">
            <span id="result-score" class="result-score-num"></span>
            <span class="result-score-total" id="result-score-total"></span>
          </div>
          <div id="result-breakdown" class="result-breakdown"></div>
          <div class="result-buttons">
            <button class="btn-retry" onclick="retryQuiz()">もう一度</button>
            <button class="btn-close-result" onclick="closeQuiz()">閉じる</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
